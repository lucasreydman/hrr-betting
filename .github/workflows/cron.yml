name: Cron — sim/lock/settle

# Replaces Vercel Cron (Hobby is capped at 2 schedules / once-per-day).
# GitHub Actions free tier: 2000 min/mo on public repos. We use ~50.
# Cron has 5-15 min jitter on free tier — fine for our use case.

on:
  schedule:
    # Sim prewarm + lock check: every 5 min during slate hours (UTC).
    # ET 3 AM rollover means the slate spans 17:00 UTC (1 PM ET / 10 AM PT)
    # through 07:00 UTC next day (3 AM ET = rollover boundary).
    - cron: '*/5 17-23 * * *'
    - cron: '*/5 0-7 * * *'

    # Settle: daily at 10:00 UTC (6 AM ET, well past the 3 AM ET rollover).
    - cron: '0 10 * * *'

    # Typical-sim: full population Sunday 4 AM ET, slate-batter Mon-Sat 4 AM ET.
    - cron: '0 8 * * 0'       # Sunday 4 AM ET — full-population typical
    - cron: '0 8 * * 1-6'     # Mon-Sat 4 AM ET — slate-batter typical

    # Slate-refresh: every 2 min during slate hours to keep picks fresh.
    - cron: '*/2 17-23 * * *'   # every 2 min, 1 PM ET → 7 PM ET (UTC)
    - cron: '*/2 0-7 * * *'     # every 2 min, 7 PM ET → 3 AM ET (UTC)

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        default: 'sim'
        type: choice
        options: [sim, lock, settle]
      date:
        description: 'Date to warm sims for (YYYY-MM-DD; default = current ET-3AM slate).'
        required: false
        default: ''

jobs:
  sim:
    if: github.event_name == 'schedule' && github.event.schedule != '0 10 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sim')
    runs-on: ubuntu-latest
    steps:
      - name: Get eligible game IDs
        id: list
        run: |
          set -e
          # Manual dispatch can override the date (to warm a specific date).
          # Default: today's slate by ET-3AM convention. We get there by taking
          # the current ET wall-clock minus 3 hours and reading the date —
          # that's the same logic as lib/date-utils.ts:slateDateString().
          # GNU date supports `-d` arithmetic; macOS BSD date does too with
          # different syntax. Runners are ubuntu-latest so GNU date applies.
          MANUAL_DATE="${{ github.event.inputs.date }}"
          if [ -n "$MANUAL_DATE" ]; then
            echo "dates=$MANUAL_DATE" >> "$GITHUB_OUTPUT"
            echo "Using manual date: $MANUAL_DATE"
          else
            SLATE=$(TZ='America/New_York' date -d '3 hours ago' +%Y-%m-%d)
            echo "dates=$SLATE" >> "$GITHUB_OUTPUT"
            echo "Using ET 3AM slate date: $SLATE"
          fi

      - name: Build game list across all dates
        id: games
        run: |
          set -e
          DATES="${{ steps.list.outputs.dates }}"
          ALL_PAIRS=""
          for DATE in $DATES; do
            RESPONSE=$(curl --silent --show-error --fail \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.VERCEL_DEPLOY_URL }}/api/sim?date=$DATE")
            echo "$DATE response:"
            echo "$RESPONSE" | jq .

            # Build space-separated "date|gameId" pairs for eligible games
            PAIRS=$(echo "$RESPONSE" | jq -r --arg d "$DATE" '.summary[] | select(.status == "eligible") | "\($d)|\(.gameId)"' | tr '\n' ' ')
            ALL_PAIRS="$ALL_PAIRS $PAIRS"
          done
          # Trim leading whitespace
          ALL_PAIRS=$(echo "$ALL_PAIRS" | xargs)
          echo "pairs=$ALL_PAIRS" >> "$GITHUB_OUTPUT"
          echo "Total eligible game-date pairs: $(echo "$ALL_PAIRS" | wc -w)"

      - name: Warm per-game sims in parallel
        if: steps.games.outputs.pairs != ''
        run: |
          set -e
          PAIRS="${{ steps.games.outputs.pairs }}"

          # Fire one curl per (date, gameId) pair in parallel; each Vercel
          # function invocation gets its own 10s budget. Per-endpoint cache
          # check skips work if hashes are unchanged.
          for pair in $PAIRS; do
            DATE="${pair%|*}"
            gameId="${pair#*|}"
            (
              echo "→ Kicking sim for game $gameId on $DATE"
              curl --silent --show-error --max-time 15 \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                "${{ secrets.VERCEL_DEPLOY_URL }}/api/sim/$gameId?date=$DATE" \
                -o /dev/null \
                -w "← Game $gameId ($DATE): HTTP %{http_code} in %{time_total}s\n"
            ) &
          done
          wait
          echo "All sims complete"

  lock:
    if: github.event_name == 'schedule' && github.event.schedule != '0 10 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'lock')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/lock
        run: |
          curl --silent --show-error --fail \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_DEPLOY_URL }}/api/lock"

  settle:
    if: github.event_name == 'schedule' && github.event.schedule == '0 10 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'settle')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/settle
        run: |
          curl --silent --show-error --fail \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_DEPLOY_URL }}/api/settle"

  typical-sim:
    if: github.event_name == 'schedule' && (github.event.schedule == '0 8 * * 0' || github.event.schedule == '0 8 * * 1-6')
    runs-on: ubuntu-latest
    steps:
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = '0 8 * * 0' ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=slate" >> $GITHUB_OUTPUT
          fi
      - name: Compute slate-batter ids (slate mode only)
        if: steps.mode.outputs.mode == 'slate'
        id: slate
        run: |
          TOMORROW=$(TZ='America/New_York' date -d 'tomorrow' +%Y-%m-%d)
          IDS=$(curl -fsS -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_BASE_URL }}/api/sim/typical-slate-ids?date=$TOMORROW")
          echo "ids=$IDS" >> $GITHUB_OUTPUT
      - name: Trigger full-mode sim
        if: steps.mode.outputs.mode == 'full'
        run: |
          curl -fsS -X POST -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json" \
            -d '{"mode":"full"}' \
            "${{ secrets.APP_BASE_URL }}/api/sim/typical"
      - name: Trigger slate-mode per-player calls
        if: steps.mode.outputs.mode == 'slate'
        run: |
          for pid in $(echo '${{ steps.slate.outputs.ids }}' | jq -r '.[]'); do
            curl -fsS -X POST -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              -H "content-type: application/json" \
              -d "{\"mode\":\"player\",\"playerId\":$pid}" \
              "${{ secrets.APP_BASE_URL }}/api/sim/typical" &
          done
          wait

  slate-refresh:
    if: github.event_name == 'schedule' && (github.event.schedule == '*/2 17-23 * * *' || github.event.schedule == '*/2 0-7 * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/refresh
        run: |
          curl -fsS -X POST -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json" \
            -d '{"scope":"today"}' \
            "${{ secrets.APP_BASE_URL }}/api/refresh"
