name: Cron — sim/lock/settle

# Replaces Vercel Cron (Hobby is capped at 2 schedules / once-per-day).
# GitHub Actions free tier: 2000 min/mo on public repos. We use ~50.
# Cron has 5-15 min jitter on free tier — fine for our use case.

on:
  schedule:
    # Settle: 7:15 UTC (3:15 AM ET, just after the slate rollover at 3 AM ET).
    # Earlier than this risks a late-night PT game still being in_progress;
    # later means yesterday's results don't appear in /history until well into
    # the next day. 3:15 AM ET is the smallest safe gap.
    - cron: '15 7 * * *'

    # Typical-sim: full population Sunday 4 AM ET, slate-batter Mon-Sat 4 AM ET.
    - cron: '0 8 * * 0'       # Sunday 4 AM ET — full-population typical
    - cron: '0 8 * * 1-6'     # Mon-Sat 4 AM ET — slate-batter typical

    # Slate-refresh: every 2 min during slate hours to keep picks fresh.
    - cron: '*/2 17-23 * * *'   # every 2 min, 1 PM ET → 7 PM ET (UTC)
    - cron: '*/2 0-7 * * *'     # every 2 min, 7 PM ET → 3 AM ET (UTC)

    # Lock check: every 5 min during slate hours (UTC).
    # ET 3 AM rollover means the slate spans 17:00 UTC (1 PM ET / 10 AM PT)
    # through 07:00 UTC next day (3 AM ET = rollover boundary).
    - cron: '*/5 17-23 * * *'
    - cron: '*/5 0-7 * * *'

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow) or `gh workflow run`
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        default: 'refresh'
        type: choice
        options: [lock, settle, refresh, typical-full, typical-slate]
      date:
        description: 'Date override (YYYY-MM-DD; default = current ET-3AM slate).'
        required: false
        default: ''

jobs:
  lock:
    if: github.event_name == 'schedule' && github.event.schedule != '15 7 * * *' && github.event.schedule != '0 8 * * 0' && github.event.schedule != '0 8 * * 1-6' && github.event.schedule != '*/2 17-23 * * *' && github.event.schedule != '*/2 0-7 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'lock')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/lock
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date }}
        run: |
          # Manual dispatches always force-lock so the operator can recover
          # past slates (e.g. when the lock cron silently dropped picks).
          # Scheduled runs hit the bare endpoint and let shouldLock decide.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            URL="${{ secrets.VERCEL_DEPLOY_URL }}/api/lock?force=1"
            if [ -n "$DATE_OVERRIDE" ]; then URL="$URL&date=$DATE_OVERRIDE"; fi
          else
            URL="${{ secrets.VERCEL_DEPLOY_URL }}/api/lock"
          fi
          # Retry on transient errors (504/503/502/408/429 + connection blips)
          # so a single Hobby-tier cold-cache timeout doesn't page. Auth (401/403)
          # and other 4xx still fail immediately. Lock is idempotent (UNIQUE on
          # locked_picks), so retrying is safe.
          curl --silent --show-error --fail \
            --retry 2 --retry-delay 5 --retry-max-time 40 --max-time 15 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "$URL"

  settle:
    if: github.event_name == 'schedule' && github.event.schedule == '15 7 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'settle')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/settle
        env:
          DATE_OVERRIDE: ${{ github.event.inputs.date }}
        run: |
          URL="${{ secrets.VERCEL_DEPLOY_URL }}/api/settle"
          if [ -n "$DATE_OVERRIDE" ]; then URL="$URL?date=$DATE_OVERRIDE"; fi
          # Settle is idempotent (upserts on date,game_id,player_id,rung).
          # Retry transient errors so a cold-cache hiccup doesn't page.
          curl --silent --show-error --fail \
            --retry 2 --retry-delay 5 --retry-max-time 40 --max-time 15 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "$URL"

  typical-sim:
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '0 8 * * 0' || github.event.schedule == '0 8 * * 1-6')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'typical-full' || github.event.inputs.job == 'typical-slate'))
    runs-on: ubuntu-latest
    steps:
      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = '0 8 * * 0' ] || [ "${{ github.event.inputs.job }}" = 'typical-full' ]; then
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=slate" >> $GITHUB_OUTPUT
          fi
      - name: Compute slate-batter ids (slate mode only)
        if: steps.mode.outputs.mode == 'slate'
        id: slate
        run: |
          TOMORROW=$(TZ='America/New_York' date -d 'tomorrow' +%Y-%m-%d)
          IDS=$(curl -fsS -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_DEPLOY_URL }}/api/sim/typical-slate-ids?date=$TOMORROW")
          echo "ids=$IDS" >> $GITHUB_OUTPUT
      - name: Trigger full-mode sim
        if: steps.mode.outputs.mode == 'full'
        run: |
          curl -fsS -X POST -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json" \
            -d '{"mode":"full"}' \
            "${{ secrets.VERCEL_DEPLOY_URL }}/api/sim/typical"
      - name: Trigger slate-mode per-player calls
        if: steps.mode.outputs.mode == 'slate'
        run: |
          for pid in $(echo '${{ steps.slate.outputs.ids }}' | jq -r '.[]'); do
            curl -fsS -X POST -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              -H "content-type: application/json" \
              -d "{\"mode\":\"player\",\"playerId\":$pid}" \
              "${{ secrets.VERCEL_DEPLOY_URL }}/api/sim/typical" &
          done
          wait

  slate-refresh:
    if: |
      (github.event_name == 'schedule' && (github.event.schedule == '*/2 17-23 * * *' || github.event.schedule == '*/2 0-7 * * *')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'refresh')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/refresh
        run: |
          # Refresh is the cache-warming path; it's also the most likely
          # to 504 on cold caches. Retry transient errors so one slow tick
          # doesn't fail the whole 2-min cadence.
          curl -fsS -X POST \
            --retry 2 --retry-delay 5 --retry-max-time 40 --max-time 15 \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "content-type: application/json" \
            -d '{"scope":"today"}' \
            "${{ secrets.VERCEL_DEPLOY_URL }}/api/refresh"
