name: Cron — sim/lock/settle

# Replaces Vercel Cron (Hobby is capped at 2 schedules / once-per-day).
# GitHub Actions free tier: 2000 min/mo on public repos. We use ~50.
# Cron has 5-15 min jitter on free tier — fine for our use case.

on:
  schedule:
    # Sim prewarm + lock check: every 5 min during slate hours (UTC).
    # Slate ≈ 17:00 UTC (10 AM Pacific) – 06:00 UTC next day (11 PM Pacific).
    - cron: '*/5 17-23 * * *'
    - cron: '*/5 0-6 * * *'

    # Settle: daily at 10:00 UTC (3 AM PDT / 2 AM PST).
    - cron: '0 10 * * *'

  # Allow manual trigger from GitHub UI (Actions tab → Run workflow)
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        required: true
        default: 'sim'
        type: choice
        options: [sim, lock, settle]
      date:
        description: 'Date to warm sims for (YYYY-MM-DD, default = today UTC). Use this to preview tomorrow.'
        required: false
        default: ''

jobs:
  sim:
    if: github.event_name == 'schedule' && github.event.schedule != '0 10 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'sim')
    runs-on: ubuntu-latest
    steps:
      - name: Get eligible game IDs
        id: list
        run: |
          set -e
          # Manual dispatch can override the date (to warm a specific date).
          # Otherwise we warm BOTH today and tomorrow each run, so users navigating
          # to either date in the UI always have warm sim caches available.
          MANUAL_DATE="${{ github.event.inputs.date }}"
          if [ -n "$MANUAL_DATE" ]; then
            echo "dates=$MANUAL_DATE" >> "$GITHUB_OUTPUT"
            echo "Using manual date: $MANUAL_DATE"
          else
            TODAY=$(date -u +%Y-%m-%d)
            TOMORROW=$(date -u -d "tomorrow" +%Y-%m-%d 2>/dev/null || date -u -v+1d +%Y-%m-%d)
            echo "dates=$TODAY $TOMORROW" >> "$GITHUB_OUTPUT"
            echo "Using dates: $TODAY $TOMORROW"
          fi

      - name: Build game list across all dates
        id: games
        run: |
          set -e
          DATES="${{ steps.list.outputs.dates }}"
          ALL_PAIRS=""
          for DATE in $DATES; do
            RESPONSE=$(curl --silent --show-error --fail \
              -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.VERCEL_DEPLOY_URL }}/api/sim?date=$DATE")
            echo "$DATE response:"
            echo "$RESPONSE" | jq .

            # Build space-separated "date|gameId" pairs for eligible games
            PAIRS=$(echo "$RESPONSE" | jq -r --arg d "$DATE" '.summary[] | select(.status == "eligible") | "\($d)|\(.gameId)"' | tr '\n' ' ')
            ALL_PAIRS="$ALL_PAIRS $PAIRS"
          done
          # Trim leading whitespace
          ALL_PAIRS=$(echo "$ALL_PAIRS" | xargs)
          echo "pairs=$ALL_PAIRS" >> "$GITHUB_OUTPUT"
          echo "Total eligible game-date pairs: $(echo "$ALL_PAIRS" | wc -w)"

          RESPONSE=$(curl --silent --show-error --fail \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_DEPLOY_URL }}/api/sim?date=$DATE")

          echo "Orchestrator response:"
          echo "$RESPONSE" | jq .

          # Extract eligible game IDs into a space-separated list
          GAME_IDS=$(echo "$RESPONSE" | jq -r '.summary[] | select(.status == "eligible") | .gameId' | tr '\n' ' ')
          echo "game_ids=$GAME_IDS" >> "$GITHUB_OUTPUT"
          echo "Found $(echo "$GAME_IDS" | wc -w) eligible games"

      - name: Warm per-game sims in parallel
        if: steps.games.outputs.pairs != ''
        run: |
          set -e
          PAIRS="${{ steps.games.outputs.pairs }}"

          # Fire one curl per (date, gameId) pair in parallel; each Vercel
          # function invocation gets its own 10s budget. Per-endpoint cache
          # check skips work if hashes are unchanged.
          for pair in $PAIRS; do
            DATE="${pair%|*}"
            gameId="${pair#*|}"
            (
              echo "→ Kicking sim for game $gameId on $DATE"
              curl --silent --show-error --max-time 15 \
                -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
                "${{ secrets.VERCEL_DEPLOY_URL }}/api/sim/$gameId?date=$DATE" \
                -o /dev/null \
                -w "← Game $gameId ($DATE): HTTP %{http_code} in %{time_total}s\n"
            ) &
          done
          wait
          echo "All sims complete"

  lock:
    if: github.event_name == 'schedule' && github.event.schedule != '0 10 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'lock')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/lock
        run: |
          curl --silent --show-error --fail \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_DEPLOY_URL }}/api/lock"

  settle:
    if: github.event_name == 'schedule' && github.event.schedule == '0 10 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'settle')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /api/settle
        run: |
          curl --silent --show-error --fail \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.VERCEL_DEPLOY_URL }}/api/settle"
